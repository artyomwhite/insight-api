databases:
  - name: insight-db
    plan: starter
    postgresMajorVersion: "15"

services:
  - type: web
    name: insight-api
    runtime: docker
    plan: starter
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: insight-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ACCESS_TOKEN_EXPIRE_HOURS
        value: "2"
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
