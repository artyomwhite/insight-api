name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: insight
          POSTGRES_PASSWORD: insight
          POSTGRES_DB: insight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check app tests

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://insight:insight@localhost:5432/insight_test
          SECRET_KEY: test-secret-key
          ADMIN_EMAIL: admin@insight.dev
          ADMIN_PASSWORD: changeme123!
        run: pytest -v
